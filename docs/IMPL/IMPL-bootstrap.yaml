pre_mortem:
    overall_risk: low
    rows:
        - scenario: Scaffold fails to compile (missing @types/vscode or incorrect import)
          likelihood: low
          impact: high
          mitigation: Scaffold Agent runs npm install and tsc --noEmit before committing
        - scenario: Wave 1 agents reference vscode APIs not in 1.85.0
          likelihood: low
          impact: medium
          mitigation: All APIs used (CodeLens, TreeView, StatusBarItem) exist since VS Code 1.60+
        - scenario: MCP protocol response shape differs from expected
          likelihood: medium
          impact: medium
          mitigation: sendRequest returns unknown; callers validate with type guards
        - scenario: vscode namespace mocking breaks vitest
          likelihood: medium
          impact: low
          mitigation: Consistent vi.mock('vscode') pattern across all agents
        - scenario: Wave 2 discovers incompatible factory signatures from Wave 1
          likelihood: low
          impact: medium
          mitigation: All signatures specified in contracts; consistent (server, context) => Disposable pattern
