scaffolds:
    - file_path: src/types.ts
      contents: |
        import * as vscode from 'vscode';

        export type ConnectionState = 'connected' | 'starting' | 'failed' | 'stopped';

        export interface ConnectionStateChange {
          state: ConnectionState;
          version?: string;
          startedAt?: number;
        }

        export interface AgentLspConfig {
          binaryPath: string;
          args: string[];
          autoStart: boolean;
          traceLevel: 'off' | 'messages' | 'verbose';
        }

        export interface SkillDescriptor {
          name: string;
          description: string;
          arguments?: SkillArgument[];
        }

        export interface SkillArgument {
          name: string;
          description: string;
          required: boolean;
          default?: string;
        }

        export interface BlastRadiusEntry {
          symbolName: string;
          line: number;
          callerCount: number;
          testCallerCount: number;
        }

        export interface InspectionFinding {
          severity: 'error' | 'warning' | 'info';
          checkType: string;
          file: string;
          line: number;
          column: number;
          message: string;
        }

        export interface IAgentLspServer {
          readonly state: ConnectionState;
          readonly onStateChange: vscode.Event<ConnectionStateChange>;
          readonly outputChannel: vscode.OutputChannel;
          start(): Promise<void>;
          stop(): Promise<void>;
          restart(): Promise<void>;
          sendRequest(method: string, params?: unknown): Promise<unknown>;
          sendNotification(method: string, params?: unknown): void;
        }

        export interface ISettingsProvider {
          getConfig(): AgentLspConfig;
          onConfigChange: vscode.Event<AgentLspConfig>;
        }
      import_path: ./types
      status: committed (8824ed2)
